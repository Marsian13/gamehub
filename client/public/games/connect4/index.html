<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Connect 4 — GameHub</title>
  <link rel="stylesheet" href="../../css/main.css"/>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-grid"></div>
  <header class="site-header">
    <div class="logo"><span class="logo-icon">♟</span><span class="logo-text">Game<span class="accent">Hub</span></span></div>
    <nav class="header-nav"><button class="nav-btn" onclick="window.location.href='../../index.html'">← Games</button><button class="info-btn" onclick="showInfo()">ⓘ</button></nav>
  </header>
  <main class="game-page">
    <div class="game-header"><button class="back-btn" onclick="window.location.href='../../index.html'">← Back</button><h1 class="game-title">🔴 CONNECT 4</h1></div>
    <div class="game-container" id="setup-screen">
      <div class="player-setup">
        <h2>PLAYER SETUP</h2>
        <div id="player-inputs" class="players-inputs"></div>
        <button class="btn-primary" onclick="startGame()" style="width:100%;margin-top:8px">START GAME</button>
      </div>
    </div>
    <div class="game-container" id="game-screen" style="display:none">
      <div id="online-info"></div>
      <div class="score-strip" id="score-strip"></div>
      <div class="c4-drop-row" id="drop-row"></div>
      <div class="c4-board" id="board"></div>
      <div style="display:flex;gap:12px;justify-content:center;margin-top:20px">
        <button class="btn-secondary" onclick="resetGame()">New Game</button>
        <button class="btn-secondary" onclick="window.location.href='../../index.html'">← Exit</button>
      </div>
    </div>
  </main>
  <div class="info-panel" id="info-panel" style="display:none">
    <div class="info-content">
      <button class="info-close" onclick="hideInfo()">✕</button>
      <h2>🔴 CONNECT 4</h2>
      <ul>
        <li>Players take turns dropping discs into a 7×6 grid.</li>
        <li>Discs fall to the lowest available position in each column.</li>
        <li>First to connect 4 discs in a row (any direction) wins!</li>
        <li>If the board fills up with no winner, it's a draw.</li>
      </ul>
    </div>
  </div>
  <div class="winner-overlay" id="winner-overlay" style="display:none">
    <div class="winner-box">
      <div class="winner-trophy" id="winner-trophy">🏆</div>
      <div class="winner-title" id="winner-title">Player Wins!</div>
      <div class="winner-btns"><button class="btn-primary" onclick="resetGame()">Play Again</button><button class="btn-secondary" onclick="window.location.href='../../index.html'">Exit</button></div>
    </div>
  </div>
  <script src="../../socket.io/socket.io.js"></script>
  <script src="../../js/main.js"></script>
  <script src="game.js"></script>
</body>
</html>
